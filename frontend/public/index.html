  </head>
  <body>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.body.innerHTML = '<div style="padding:2rem;font-family:monospace;background:#fff3cd;border:3px solid red;border-radius:8px;margin:2rem;white-space:pre-wrap"><h2 style="color:red">JS Error (window.onerror)</h2><b>' + msg + '</b><br><br>File: ' + src + '<br>Line: ' + line + ':' + col + '<br><br>' + (err ? err.stack : '') + '</div>';
        return false;
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML = '<div style="padding:2rem;font-family:monospace;background:#fff3cd;border:3px solid orange;border-radius:8px;margin:2rem;white-space:pre-wrap"><h2 style="color:darkorange">Unhandled Promise Rejection</h2>' + String(e.reason) + '</div>';
      });
    </script>
    <div id="root"></div>

    <!-- Pre-compiled React app bundle (built with Vite — no CDN/Babel needed) -->
    <script src="/dist/react-app.js" defer></script>

    <!-- Chatbot: lazy-loaded on first user interaction (~37 KB saved from initial page load) -->
    <script>
      (function(){var d=false;function l(){if(d)return;d=true;var s=document.createElement('script');s.src='/chatbot.js';document.body.appendChild(s);}['scroll','click','touchstart','mousemove'].forEach(function(e){window.addEventListener(e,l,{once:true,passive:true});});setTimeout(l,5000);})();
    </script>
  </body>
